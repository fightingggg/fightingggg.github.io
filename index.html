<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React 카페 키오스크</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; user-select: none; }
        body { background-color: #f0f2f5; display: flex; justify-content: flex-start; padding: 20px; height: 100vh; }

        /* 키오스크 메인 프레임 */
        .kiosk-container { width: 1100px; height: 900px; background-color: #fff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; border: 10px solid #333; position: relative; }
        header { background-color: #2c3e50; color: #fff; padding: 20px; text-align: center; font-size: 28px; font-weight: 700; letter-spacing: 2px; }
        .main-content { display: flex; flex: 1; height: calc(100% - 70px); }
        .category{
            width:100px;
            height:120px;
            display:flex;
            align-items: center ;
        }
        /* 카테고리 */
        .category-nav { width: 180px; background-color: #ecf0f1; display: flex; flex-direction: column; }
        .category-btn { padding: 25px 10px; font-size: 20px; font-weight: 500; color: #7f8c8d; border: none; background: none; border-bottom: 1px solid #bdc3c7; cursor: pointer; transition: 0.3s; }
        .category-btn.active { background-color: #fff; color: #2c3e50; font-weight: 700; border-left: 5px solid #e74c3c; }

        /* 메뉴 보드 */
        .menu-section { flex: 1; padding: 20px; background-color: #fff; overflow-y: auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; align-content: start; }
        .menu-card { border: 1px solid #e0e0e0; border-radius: 10px; padding: 15px; text-align: center; cursor: pointer; display: flex; flex-direction: column; align-items: center; transition: all 0.2s; }
        .menu-card:active { transform: scale(0.95); background-color: #f9f9f9; }
        .menu-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; }
        .menu-name { font-size: 18px; font-weight: 700; color: #333; margin-bottom: 5px; word-break: keep-all; }
        .menu-price { font-size: 16px; color: #e74c3c; font-weight: 700; }

        /* 장바구니 */
        .cart-section { width: 360px; background-color: #fafafa; border-left: 2px solid #eee; display: flex; flex-direction: column; }
        .cart-header { padding: 15px; background-color: #2c3e50; color: white; font-size: 20px; font-weight: 700; text-align: center; }
        .cart-items { flex: 1; overflow-y: auto; padding: 15px; }
        .cart-item { background-color: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 15px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px; }
        .cart-item-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .cart-item-title { font-weight: 700; font-size: 16px; }
        .delete-btn { background: none; border: none; color: #95a5a6; font-size: 18px; cursor: pointer; }
        .delete-btn:hover { color: #e74c3c; }
        .cart-controls { display: flex; justify-content: space-between; align-items: center; }
        .qty-btn { width: 32px; height: 32px; background-color: #ecf0f1; border: none; border-radius: 5px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .qty-display { font-size: 16px; font-weight: 700; width: 30px; text-align: center; display: inline-block; }
        .item-price { font-weight: 700; color: #e74c3c; }
        .cart-footer { padding: 20px; background-color: #fff; border-top: 2px solid #eee; }
        .total-price-box { display: flex; justify-content: space-between; font-size: 24px; font-weight: 700; margin-bottom: 20px; color: #2c3e50; }
        .pay-btn { width: 100%; padding: 20px; background-color: #e74c3c; color: white; border: none; border-radius: 10px; font-size: 24px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .pay-btn:active { background-color: #c0392b; }
        .pay-btn:disabled { background-color: #bdc3c7; cursor: not-allowed; }

        /* 결제 모달 (창작된 리얼 UI) */
        .modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 100; flex-direction: column; }
        .modal-box { background: #fff; width: 600px; border-radius: 15px; padding: 40px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5); position: relative; }
        .modal-title { font-size: 28px; font-weight: 700; margin-bottom: 30px; color: #2c3e50; }
        
        /* 모달 버튼 스타일 */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .big-btn { padding: 40px 20px; font-size: 24px; font-weight: 700; border: 2px solid #ddd; border-radius: 15px; background: #fff; cursor: pointer; transition: 0.2s; color: #333; }
        .big-btn:active { background: #f0f0f0; transform: scale(0.98); }
        .big-btn.primary { border-color: #e74c3c; color: #e74c3c; }
        
        /* 닫기/이전 버튼 */
        .close-modal { position: absolute; top: 20px; right: 25px; font-size: 30px; cursor: pointer; color: #999; border: none; background: none; }
        .action-btn { padding: 15px 30px; font-size: 18px; font-weight: 700; border-radius: 8px; border: none; cursor: pointer; margin: 5px; }
        .btn-gray { background: #bdc3c7; color: #fff; }
        .btn-red { background: #e74c3c; color: #fff; }

        /* 포인트 넘패드 */
        .phone-input { font-size: 32px; font-weight: bold; letter-spacing: 5px; margin-bottom: 20px; padding: 15px; border-bottom: 3px solid #34495e; min-height: 70px; display: flex; align-items: center; justify-content: center; color: #2c3e50; }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 300px; margin: 0 auto 30px; }
        .num-btn { padding: 20px; font-size: 24px; font-weight: 700; background: #ecf0f1; border: none; border-radius: 10px; cursor: pointer; }
        .num-btn:active { background: #bdc3c7; }

        /* 로딩 스피너 */
        .spinner { border: 8px solid #f3f3f3; border-top: 8px solid #e74c3c; border-radius: 50%; width: 80px; height: 80px; animation: spin 1s linear infinite; margin: 0 auto 30px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* 영수증 UI */
        .receipt-box { border: 2px dashed #ccc; padding: 30px; margin-bottom: 30px; background: #fafafa; }
        .order-number { font-size: 60px; font-weight: 900; color: #e74c3c; margin: 20px 0; }
    </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect } = React;

    // 데이터 베이스 (외부에 선언)
    const menuData = [
        { id: 1, name: "아메리카노 (HOT)", price: 4000, category: "coffee", img: "https://images.unsplash.com/photo-1559525839-b184a4d698c7?w=300&h=300&fit=crop" },
        { id: 2, name: "아메리카노 (ICED)", price: 4500, category: "coffee", img: "https://images.unsplash.com/photo-1517701604599-bb29b565090c?w=300&h=300&fit=crop" },
        { id: 3, name: "카페라떼 (HOT)", price: 5000, category: "coffee", img: "https://images.unsplash.com/photo-1572442388796-11668a67e53d?w=300&h=300&fit=crop" },
        { id: 14, name: "복숭아 아이스티", price: 4000, category: "ade", img: "https://images.unsplash.com/photo-1556679343-c7306c1976bc?w=300&h=300&fit=crop" },
        { id: 19, name: "바스크 치즈케이크", price: 6500, category: "dessert", img: "https://images.unsplash.com/photo-1524351199678-941a58a3df50?w=300&h=300&fit=crop" },
    ];

    function formatPrice(price) {
        return price.toLocaleString('ko-KR');
    }

    function App() {
        // --- React State 관리 ---
        const [cart, setCart] = useState([]);
        const [category, setCategory] = useState("coffee");
        const [step, setStep] = useState(0); // 0: 메인, 1: 매장/포장, 2: 포인트, 3: 결제방식, 4: 로딩, 5: 완료
        
        // 결제 정보 저장용 State
        const [orderType, setOrderType] = useState(""); // 매장 or 포장
        const [phoneNum, setPhoneNum] = useState(""); 
        const [orderNum, setOrderNum] = useState(0);

        // 총 결제 금액 계산
        const totalPrice = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);

        // --- 장바구니 로직 ---
        const addToCart = (item) => {
            setCart(prev => {
                const existing = prev.find(i => i.id === item.id);
                if (existing) {
                    return prev.map(i => i.id === item.id ? { ...i, qty: i.qty + 1 } : i);
                }
                return [...prev, { ...item, qty: 1 }];
            });
        };

        const changeQty = (id, amount) => {
            setCart(prev => prev.map(item => {
                if (item.id === id) {
                    const newQty = item.qty + amount;
                    return { ...item, qty: newQty < 1 ? 1 : newQty };
                }
                return item;
            }));
        };

        const removeItem = (id) => {
            setCart(prev => prev.filter(item => item.id !== id));
        };

        // --- 결제 프로세스 흐름 제어 ---
        const startPayment = () => {
            if (cart.length === 0) return alert("장바구니가 비어있습니다.");
            setStep(1); // 매장/포장 선택으로 이동
        };

        const handleOrderType = (type) => {
            setOrderType(type);
            setStep(2); // 포인트 적립으로 이동
        };

        const handleNumpad = (num) => {
            if (phoneNum.length < 13) {
                let newNum = phoneNum + num;
                // 하이픈(-) 자동 추가 로직
                if (newNum.length === 3 || newNum.length === 8) newNum += "-";
                setPhoneNum(newNum);
            }
        };

        const deleteNum = () => {
            setPhoneNum(prev => prev.endsWith("-") ? prev.slice(0, -2) : prev.slice(0, -1));
        };

        const skipPointOrNext = () => {
            setStep(3); // 결제 수단 선택으로 이동
        };

        const processPayment = () => {
            setStep(4); // 결제 진행 중 (로딩 화면)
            
            // 2.5초 후 결제 완료 화면으로 자동 전환
            setTimeout(() => {
                setOrderNum(Math.floor(Math.random() * 900) + 100); // 100~999 번호 발급
                setStep(5); 
            }, 2500);
        };

        const resetKiosk = () => {
            setCart([]);
            setCategory("coffee");
            setOrderType("");
            setPhoneNum("");
            setStep(0);
        };

        // --- 렌더링 영역 ---
        return (
            <div className="kiosk-container">
                <header>☕ GEMINI COFFEE STAND</header>
                
                <div className="main-content">
                    {/* 좌측: 카테고리 */}
                    <nav className="category-nav">
                        <button className={`category-btn ${category === 'coffee' ? 'active' : ''}`} onClick={() => setCategory('coffee')}>커피</button>
                        <button className={`category-btn ${category === 'ade' ? 'active' : ''}`} onClick={() => setCategory('ade')}>음료/티</button>
                        <button className={`category-btn ${category === 'dessert' ? 'active' : ''}`} onClick={() => setCategory('dessert')}>디저트</button>
                    </nav>

                    {/* 중앙: 메뉴 보드 */}
                    <section className="menu-section">
                        {menuData.filter(item => item.category === category).map(item => (
                            <div key={item.id} className="menu-card" onClick={() => addToCart(item)}>
                                <img src={item.img} className="menu-img" alt={item.name} />
                                <div className="menu-name">{item.name}</div>
                                <div className="menu-price">{formatPrice(item.price)}원</div>
                            </div>
                        ))}
                    </section>

                    {/* 우측: 장바구니 */}
                    <aside className="cart-section">
                        <div className="cart-header">주문 내역</div>
                        <div className="cart-items">
                            {cart.length === 0 ? <div style={{textAlign:'center', color:'#999', marginTop:'50px'}}>메뉴를 선택해주세요.</div> : null}
                            {cart.map(item => (
                                <div key={item.id} className="cart-item">
                                    <div className="cart-item-top">
                                        <div className="cart-item-title">{item.name}</div>
                                        <button className="delete-btn" onClick={() => removeItem(item.id)}>✖</button>
                                    </div>
                                    <div className="cart-controls">
                                        <span className="item-price">{formatPrice(item.price * item.qty)}원</span>
                                        <div>
                                            <button className="qty-btn" onClick={() => changeQty(item.id, -1)}>-</button>
                                            <span className="qty-display">{item.qty}</span>
                                            <button className="qty-btn" onClick={() => changeQty(item.id, 1)}>+</button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="cart-footer">
                            <div className="total-price-box">
                                <span>총 결제금액</span>
                                <span>{formatPrice(totalPrice)}원</span>
                            </div>
                            <button className="pay-btn" disabled={cart.length === 0} onClick={startPayment}>결제하기</button>
                        </div>
                    </aside>
                </div>

                {/* ---------------- 모달 (결제 프로세스) 영역 ---------------- */}
                
                {/* STEP 1: 매장/포장 선택 */}
                {step === 1 && (
                    <div className="modal-overlay">
                        <div className="modal-box">
                            <button className="close-modal" onClick={() => setStep(0)}>✖</button>
                            <h2 className="modal-title">어디서 드시겠습니까?</h2>
                            <div className="grid-2">
                                <button className="big-btn primary" onClick={() => handleOrderType("매장")}>🍽️ 매장 식사</button>
                                <button className="big-btn primary" onClick={() => handleOrderType("포장")}>🛍️ 포장 주문</button>
                            </div>
                        </div>
                    </div>
                )}

                {/* STEP 2: 포인트 적립 */}
                {step === 2 && (
                    <div className="modal-overlay">
                        <div className="modal-box">
                            <h2 className="modal-title">멤버십 포인트 적립</h2>
                            <div className="phone-input">{phoneNum || "전화번호를 입력해주세요"}</div>
                            <div className="numpad">
                                {[1,2,3,4,5,6,7,8,9].map(num => (
                                    <button key={num} className="num-btn" onClick={() => handleNumpad(num.toString())}>{num}</button>
                                ))}
                                <button className="num-btn" onClick={deleteNum}>지움</button>
                                <button className="num-btn" onClick={() => handleNumpad("0")}>0</button>
                                <button className="num-btn" onClick={() => setPhoneNum("")}>초기화</button>
                            </div>
                            <div>
                                <button className="action-btn btn-gray" onClick={skipPointOrNext}>적립 안함</button>
                                <button className="action-btn btn-red" onClick={skipPointOrNext}>입력 완료</button>
                            </div>
                        </div>
                    </div>
                )}

                {/* STEP 3: 결제 수단 선택 */}
                {step === 3 && (
                    <div className="modal-overlay">
                        <div className="modal-box">
                            <button className="close-modal" onClick={() => setStep(2)}>✖</button>
                            <h2 className="modal-title">결제 수단을 선택해주세요</h2>
                            <h3 style={{color: '#e74c3c', marginBottom: '20px'}}>결제 금액: {formatPrice(totalPrice)}원</h3>
                            <div className="grid-2">
                                <button className="big-btn" onClick={processPayment}>💳 신용/체크카드<br/><span style={{fontSize:'14px', color:'#777'}}>IC카드 투입</span></button>
                                <button className="big-btn" onClick={processPayment}>📱 간편 결제<br/><span style={{fontSize:'14px', color:'#777'}}>삼성페이 / 애플페이</span></button>
                                <button className="big-btn" onClick={processPayment}>💬 카카오/네이버페이<br/><span style={{fontSize:'14px', color:'#777'}}>바코드 스캔</span></button>
                                <button className="big-btn" onClick={processPayment}>🎫 모바일 쿠폰<br/><span style={{fontSize:'14px', color:'#777'}}>기프티콘 스캔</span></button>
                            </div>
                        </div>
                    </div>
                )}

                {/* STEP 4: 결제 처리 중 */}
                {step === 4 && (
                    <div className="modal-overlay">
                        <div className="modal-box">
                            <div className="spinner"></div>
                            <h2 className="modal-title">결제를 진행 중입니다...</h2>
                            <p style={{fontSize: '18px', color: '#7f8c8d'}}>카드를 빼지 마시고 잠시만 기다려주세요.</p>
                        </div>
                    </div>
                )}

                {/* STEP 5: 결제 완료 및 영수증 */}
                {step === 5 && (
                    <div className="modal-overlay">
                        <div className="modal-box" style={{borderTop: '15px solid #e74c3c'}}>
                            <h2 className="modal-title" style={{color: '#e74c3c'}}>결제가 완료되었습니다!</h2>
                            <div className="receipt-box">
                                <p style={{fontSize: '20px', fontWeight: 'bold'}}>주문번호</p>
                                <div className="order-number">{orderNum}</div>
                                <p style={{fontSize: '16px', color: '#555'}}>{orderType} 주문 / 결제금액: {formatPrice(totalPrice)}원</p>
                            </div>
                            <p style={{marginBottom: '30px', color: '#7f8c8d'}}>신용카드와 영수증을 챙겨주세요.</p>
                            <button className="action-btn btn-red" style={{width: '100%', padding: '20px', fontSize: '24px'}} onClick={resetKiosk}>처음으로 돌아가기</button>
                        </div>
                    </div>
                )}

            </div>
        );
    }

    // React 18 렌더링 방식
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>

</body>
</html>
